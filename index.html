<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adaptive Training Calorie Tracker</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    margin: 0;
    padding: 30px;
    color: #222;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,.08);
}

h1 {
    margin-top: 0;
}

.food-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
    gap: 12px;
}

button {
    background: #111827;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    opacity: .85;
}

.progress {
    height: 18px;
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
}

.item {
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

input {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h1>Adaptive Training Nutrition</h1>
<p>Track calories based on your daily training goal.</p>

<h3>Daily Goal</h3>
<h2>2500 kcal</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="progressText">0 / 2500 kcal</p>
</div>


<div class="card">

<h2>Food Library</h2>

<div class="food-grid" id="foods"></div>

<h3>Add Custom Food</h3>

<input id="foodName" placeholder="Food name">
<input id="foodCalories" type="number" placeholder="Calories">

<button onclick="addCustomFood()">Add Food</button>

</div>


<div class="card">

<h2>Today's Intake</h2>

<div id="intake"></div>

</div>


</div>


<script>

const calorieGoal = 2500;

let calories = 0;

let selectedFoods = [];

let foods = [
    {name:"Rice Bowl", calories:200},
    {name:"Chicken Breast", calories:165},
    {name:"Egg", calories:70},
    {name:"Banana", calories:105},
    {name:"Milk", calories:120},
    {name:"Oats", calories:150},
    {name:"Protein Shake", calories:130},
    {name:"Peanut Butter", calories:190}
];


function renderFoods(){

    const container=document.getElementById("foods");

    container.innerHTML="";

    foods.forEach(food=>{

        const btn=document.createElement("button");

        btn.innerHTML=
        `${food.name}<br>${food.calories} kcal`;

        btn.onclick=()=>{
            addFood(food);
        };

        container.appendChild(btn);

    });

}



function addFood(food){

    calories += food.calories;

    selectedFoods.push(food);

    update();

}



function addCustomFood(){

    const name=document.getElementById("foodName").value;

    const caloriesValue=
    Number(document.getElementById("foodCalories").value);


    if(!name || !caloriesValue)
        return;


    const food={
        name:name,
        calories:caloriesValue
    };


    foods.push(food);

    addFood(food);

    renderFoods();

}



function update(){

    document.getElementById("progressText")
    .innerText=
    `${calories} / ${calorieGoal} kcal`;


    document.getElementById("bar")
    .style.width=
    Math.min((calories/calorieGoal)*100,100)+"%";


    const intake=document.getElementById("intake");

    intake.innerHTML="";


    selectedFoods.forEach(food=>{

        const div=document.createElement("div");

        div.className="item";

        div.innerHTML=
        `<span>${food.name}</span>
        <b>${food.calories} kcal</b>`;


        intake.appendChild(div);

    });

}


renderFoods();

</script>

</body>
</html>
